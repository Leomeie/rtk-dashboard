<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Projects - RTK Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: #0f1117; color: #e1e4e8; min-height: 100vh; }
.header { padding: 20px 32px; border-bottom: 1px solid #21262d; display: flex; justify-content: space-between; align-items: center; }
.header h1 { font-size: 22px; font-weight: 600; }
.header h1 span { color: #58a6ff; }
.header-right { display: flex; align-items: center; gap: 16px; font-size: 13px; color: #8b949e; }
.nav { display: flex; gap: 8px; }
.nav a { color: #8b949e; text-decoration: none; padding: 6px 14px; border-radius: 8px; font-size: 13px; border: 1px solid #30363d; }
.nav a:hover, .nav a.active { color: #e1e4e8; border-color: #58a6ff; }
.main { padding: 24px 32px; max-width: 1400px; margin: 0 auto; }

.section { margin-bottom: 40px; }
.section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.section-header h2 { font-size: 18px; font-weight: 600; }
.section-tag { font-size: 11px; padding: 2px 8px; border-radius: 10px; font-weight: 500; }
.tag-rtk { background: #58a6ff22; color: #58a6ff; border: 1px solid #58a6ff44; }
.tag-wolf { background: #7c3aed22; color: #a78bfa; border: 1px solid #7c3aed44; }

.add-row { display: flex; gap: 10px; margin-bottom: 16px; }
.add-row input { flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 10px 14px; color: #e1e4e8; font-size: 14px; outline: none; }
.add-row input:focus { border-color: #58a6ff; }
.add-row input::placeholder { color: #484f58; }
.btn { background: #238636; border: none; border-radius: 8px; padding: 10px 18px; color: #fff; font-size: 14px; font-weight: 500; cursor: pointer; white-space: nowrap; }
.btn:hover { background: #2ea043; }
.btn-purple { background: #7c3aed; }
.btn-purple:hover { background: #6d28d9; }
.btn-outline { background: transparent; border: 1px solid #30363d; color: #8b949e; border-radius: 8px; padding: 6px 12px; font-size: 13px; cursor: pointer; }
.btn-outline:hover { border-color: #58a6ff; color: #e1e4e8; }

.project-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
.project-card { background: #161b22; border: 1px solid #21262d; border-radius: 12px; padding: 20px; position: relative; }
.project-card .name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.project-card .path { font-size: 12px; color: #8b949e; margin-bottom: 12px; word-break: break-all; }
.project-card .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.project-card .stat-label { font-size: 11px; color: #8b949e; }
.project-card .stat-val { font-size: 18px; font-weight: 600; }
.project-card .remove-btn { position: absolute; top: 12px; right: 12px; background: transparent; border: none; color: #484f58; cursor: pointer; font-size: 16px; }
.project-card .remove-btn:hover { color: #f85149; }
.wolf-badge { display: inline-block; font-size: 10px; padding: 1px 6px; border-radius: 6px; background: #7c3aed33; color: #a78bfa; margin-left: 8px; vertical-align: middle; }

.empty-state { text-align: center; padding: 40px; color: #484f58; font-size: 14px; }
.toast { position: fixed; bottom: 24px; right: 24px; background: #238636; color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 14px; opacity: 0; transition: opacity 0.3s; z-index: 999; }
.toast.show { opacity: 1; }
.toast.error { background: #da3633; }

@media (max-width: 768px) { .main { padding: 16px; } .header { padding: 16px; flex-wrap: wrap; gap: 12px; } }
</style>
</head>
<body>

<div class="header">
  <h1><span>RTK</span> Token <span data-i18n="title_suffix">Dashboard</span></h1>
  <div class="header-right">
    <div class="nav">
      <a href="/" data-i18n="nav_home">Overview</a>
      <a href="/projects" class="active" data-i18n="nav_projects">Projects</a>
    </div>
    <button class="btn-outline" id="lang-toggle" onclick="toggleLang()">中文</button>
  </div>
</div>

<div class="main">
  <!-- RTK Projects -->
  <div class="section">
    <div class="section-header">
      <h2>RTK <span data-i18n="projects">Projects</span></h2>
      <span class="section-tag tag-rtk">Rust Token Killer</span>
    </div>
    <div class="add-row">
      <input type="text" id="project-name" data-i18n-placeholder="ph_name" placeholder="Project name (optional)">
      <input type="text" id="project-path" data-i18n-placeholder="ph_path" placeholder="Project directory path, e.g. C:\Users\Luo\my-project">
      <button class="btn" onclick="addProject()" data-i18n="add_project">Add Project</button>
    </div>
    <div class="project-cards" id="project-cards"></div>
  </div>

  <!-- OpenWolf -->
  <div class="section">
    <div class="section-header">
      <h2>OpenWolf</h2>
      <span class="section-tag tag-wolf">AI Brain</span>
    </div>
    <div class="add-row">
      <input type="text" id="wolf-path" data-i18n-placeholder="wolf_ph" placeholder="Project directory to initialize OpenWolf">
      <button class="btn btn-purple" onclick="initOpenWolf()" data-i18n="init_wolf">Init OpenWolf</button>
    </div>
    <div class="project-cards" id="wolf-cards"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const I18N = {
  en: {
    title_suffix: 'Dashboard', nav_home: 'Overview', nav_projects: 'Projects',
    projects: 'Projects', ph_name: 'Project name (optional)',
    ph_path: 'Project directory path, e.g. C:\\Users\\Luo\\my-project',
    add_project: 'Add Project', empty_projects: 'No projects added yet.',
    loading_stats: 'Loading...', stat_commands: 'Commands', stat_input: 'Input', stat_output: 'Output',
    stat_saved: 'Saved', stat_savings: 'Savings', stat_time: 'Time',
    wolf_ph: 'Project directory to initialize OpenWolf',
    init_wolf: 'Init OpenWolf', wolf_init_ok: 'OpenWolf initialized!',
    wolf_init_fail: 'Init failed', wolf_not_init: 'Not initialized',
    wolf_sessions: 'Sessions', wolf_tokens: 'Tokens Tracked', wolf_savings: 'Est. Savings',
    wolf_reads: 'Reads', wolf_writes: 'Writes', wolf_blocked: 'Blocked Repeats',
    error_prefix: 'Error', remove_title: 'Remove', wolf_no_projects: 'Add a project above, then click Init OpenWolf.',
  },
  zh: {
    title_suffix: '仪表盘', nav_home: '概览', nav_projects: '项目管理',
    projects: '项目', ph_name: '项目名称（可选）',
    ph_path: '项目目录路径，例如 C:\\Users\\Luo\\my-project',
    add_project: '添加项目', empty_projects: '暂无项目，请在上方添加',
    loading_stats: '加载中...', stat_commands: '命令数', stat_input: '输入', stat_output: '输出',
    stat_saved: '节省', stat_savings: '节省率', stat_time: '耗时',
    wolf_ph: '要初始化 OpenWolf 的项目目录',
    init_wolf: '初始化 OpenWolf', wolf_init_ok: 'OpenWolf 已初始化！',
    wolf_init_fail: '初始化失败', wolf_not_init: '未初始化',
    wolf_sessions: '会话数', wolf_tokens: '已追踪 Token', wolf_savings: '预估节省',
    wolf_reads: '读取次数', wolf_writes: '写入次数', wolf_blocked: '重复读取拦截',
    error_prefix: '错误', remove_title: '移除', wolf_no_projects: '先添加项目，再点击初始化 OpenWolf。',
  }
};

let lang = localStorage.getItem('rtk_lang') || 'en';
let t = I18N[lang];
function toggleLang() { lang = lang === 'en' ? 'zh' : 'en'; localStorage.setItem('rtk_lang', lang); t = I18N[lang]; applyLang(); loadProjects(); loadWolfProjects(); }
function applyLang() {
  document.getElementById('lang-toggle').textContent = lang === 'en' ? '中文' : 'English';
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t[el.dataset.i18n] || el.textContent; });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => { el.placeholder = t[el.dataset.i18nPlaceholder] || el.placeholder; });
}

function fmtTokens(n) { if (n >= 1e6) return (n/1e6).toFixed(1)+'M'; if (n >= 1e3) return (n/1e3).toFixed(1)+'K'; return n.toString(); }
function fmtTime(ms) { const s=ms/1000; if(s>=3600) return (s/3600).toFixed(1)+'h'; if(s>=60) return (s/60).toFixed(0)+'m'; return s.toFixed(0)+'s'; }
function showToast(msg, error) { const el=document.getElementById('toast'); el.textContent=msg; el.className='toast show'+(error?' error':''); setTimeout(()=>el.className='toast',3000); }

// --- RTK Projects ---
let projects = [];
async function loadProjects() {
  const res = await fetch('/api/projects');
  projects = await res.json();
  renderProjects();
}

async function renderProjects() {
  const container = document.getElementById('project-cards');
  if (!projects.length) { container.innerHTML = `<div class="empty-state">${t.empty_projects}</div>`; return; }
  // Check OpenWolf status for each project
  const wolfStatus = {};
  for (const p of projects) {
    try { const r = await fetch('/api/openwolf/status?path='+encodeURIComponent(p.path)); const d = await r.json(); wolfStatus[p.path] = d.initialized; } catch(e){}
  }
  container.innerHTML = projects.map(p => {
    const id = btoa(p.path);
    const badge = wolfStatus[p.path] ? `<span class="wolf-badge">OpenWolf</span>` : '';
    return `<div class="project-card" id="proj-${id}">
      <button class="remove-btn" onclick="removeProject('${p.path.replace(/\\/g,'\\\\')}')" title="${t.remove_title}">&times;</button>
      <div class="name">${p.name}${badge}</div>
      <div class="path">${p.path}</div>
      <div class="stats" id="stats-${id}"><div class="stat-item"><div class="stat-label">${t.loading_stats}</div></div></div>
    </div>`;
  }).join('');
  projects.forEach(p => loadProjectStats(p));
}

async function loadProjectStats(p) {
  const res = await fetch('/api/project?path='+encodeURIComponent(p.path));
  const data = await res.json();
  const id = btoa(p.path);
  if (data.error) { document.getElementById('stats-'+id).innerHTML = `<div class="stat-item"><div class="stat-label">${t.error_prefix}: ${data.error}</div></div>`; return; }
  const s = data.summary;
  document.getElementById('stats-'+id).innerHTML = `
    <div class="stat-item"><div class="stat-label">${t.stat_commands}</div><div class="stat-val">${s.total_commands}</div></div>
    <div class="stat-item"><div class="stat-label">${t.stat_input}</div><div class="stat-val blue">${fmtTokens(s.total_input)}</div></div>
    <div class="stat-item"><div class="stat-label">${t.stat_output}</div><div class="stat-val purple">${fmtTokens(s.total_output)}</div></div>
    <div class="stat-item"><div class="stat-label">${t.stat_saved}</div><div class="stat-val green">${fmtTokens(s.total_saved)}</div></div>
    <div class="stat-item"><div class="stat-label">${t.stat_savings}</div><div class="stat-val orange">${s.avg_savings_pct.toFixed(1)}%</div></div>
    <div class="stat-item"><div class="stat-label">${t.stat_time}</div><div class="stat-val">${fmtTime(s.total_time_ms)}</div></div>`;
}

async function addProject() {
  const nameEl = document.getElementById('project-name');
  const pathEl = document.getElementById('project-path');
  const path = pathEl.value.trim(); const name = nameEl.value.trim();
  if (!path) return;
  const res = await fetch('/api/projects', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({path,name}) });
  const d = await res.json();
  if (d.error) { showToast(t.error_prefix+': '+d.error, true); return; }
  nameEl.value=''; pathEl.value='';
  loadProjects(); loadWolfProjects();
}

async function removeProject(path) {
  await fetch('/api/projects', { method:'DELETE', headers:{'Content-Type':'application/json'}, body:JSON.stringify({path}) });
  loadProjects(); loadWolfProjects();
}

// --- OpenWolf ---
async function loadWolfProjects() {
  const container = document.getElementById('wolf-cards');
  if (!projects.length) { container.innerHTML = `<div class="empty-state">${t.wolf_no_projects}</div>`; return; }
  const cards = [];
  for (const p of projects) {
    try {
      const r = await fetch('/api/openwolf/status?path='+encodeURIComponent(p.path));
      const d = await r.json();
      if (d.initialized) {
        const l = d.ledger||{};
        cards.push(`<div class="project-card">
          <div class="name">${p.name}</div>
          <div class="path">${p.path}</div>
          <div class="stats">
            <div class="stat-item"><div class="stat-label">${t.wolf_sessions}</div><div class="stat-val">${l.total_sessions||0}</div></div>
            <div class="stat-item"><div class="stat-label">${t.wolf_tokens}</div><div class="stat-val blue">${fmtTokens(l.total_tokens_estimated||0)}</div></div>
            <div class="stat-item"><div class="stat-label">${t.wolf_savings}</div><div class="stat-val green">${fmtTokens(l.estimated_savings_vs_bare_cli||0)}</div></div>
            <div class="stat-item"><div class="stat-label">${t.wolf_reads}</div><div class="stat-val">${l.total_reads||0}</div></div>
            <div class="stat-item"><div class="stat-label">${t.wolf_writes}</div><div class="stat-val">${l.total_writes||0}</div></div>
            <div class="stat-item"><div class="stat-label">${t.wolf_blocked}</div><div class="stat-val orange">${l.repeated_reads_blocked||0}</div></div>
          </div>
        </div>`);
      }
    } catch(e){}
  }
  container.innerHTML = cards.length ? cards.join('') : `<div class="empty-state">${t.wolf_no_projects}</div>`;
}

async function initOpenWolf() {
  const pathEl = document.getElementById('wolf-path');
  const path = pathEl.value.trim();
  if (!path) return;
  showToast('Initializing OpenWolf...');
  const res = await fetch('/api/openwolf/init', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({path}) });
  const data = await res.json();
  pathEl.value = '';
  if (data.code === 0) { showToast(t.wolf_init_ok); loadProjects(); loadWolfProjects(); }
  else { showToast(t.wolf_init_fail+': '+(data.stderr||data.error||''), true); }
}

// Enter key support
document.getElementById('project-path').addEventListener('keydown', e => { if (e.key==='Enter') addProject(); });
document.getElementById('project-name').addEventListener('keydown', e => { if (e.key==='Enter') addProject(); });
document.getElementById('wolf-path').addEventListener('keydown', e => { if (e.key==='Enter') initOpenWolf(); });

applyLang(); loadProjects(); loadWolfProjects();
</script>
</body>
</html>
