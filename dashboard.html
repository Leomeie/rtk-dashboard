<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RTK Token Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #0f1117;
  color: #e1e4e8;
  min-height: 100vh;
}
.header {
  padding: 24px 32px;
  border-bottom: 1px solid #21262d;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.header h1 { font-size: 22px; font-weight: 600; }
.header h1 span { color: #58a6ff; }
.header-right { display: flex; align-items: center; gap: 16px; font-size: 13px; color: #8b949e; }
.header-right .dot { width: 8px; height: 8px; border-radius: 50%; background: #3fb950; display: inline-block; }
.main { padding: 24px 32px; max-width: 1400px; margin: 0 auto; }

/* Cards */
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }
.card {
  background: #161b22;
  border: 1px solid #21262d;
  border-radius: 12px;
  padding: 20px;
}
.card-label { font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.card-value { font-size: 28px; font-weight: 700; }
.card-value.green { color: #3fb950; }
.card-value.blue { color: #58a6ff; }
.card-value.purple { color: #bc8cff; }
.card-value.orange { color: #d29922; }
.card-sub { font-size: 12px; color: #8b949e; margin-top: 4px; }

/* Efficiency bar */
.eff-bar-wrap { margin-top: 8px; }
.eff-bar { height: 6px; background: #21262d; border-radius: 3px; overflow: hidden; }
.eff-bar-fill { height: 100%; background: linear-gradient(90deg, #3fb950, #58a6ff); border-radius: 3px; transition: width 0.6s ease; }

/* Charts */
.charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 32px; }
.chart-box {
  background: #161b22;
  border: 1px solid #21262d;
  border-radius: 12px;
  padding: 20px;
}
.chart-box h3 { font-size: 14px; font-weight: 600; margin-bottom: 16px; color: #c9d1d9; }

/* Projects */
.projects-section { margin-bottom: 32px; }
.projects-section h2 { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
.add-project { display: flex; gap: 10px; margin-bottom: 16px; }
.add-project input {
  flex: 1;
  background: #0d1117;
  border: 1px solid #30363d;
  border-radius: 8px;
  padding: 10px 14px;
  color: #e1e4e8;
  font-size: 14px;
  outline: none;
}
.add-project input:focus { border-color: #58a6ff; }
.add-project input::placeholder { color: #484f58; }
.btn {
  background: #238636;
  border: none;
  border-radius: 8px;
  padding: 10px 18px;
  color: #fff;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  white-space: nowrap;
}
.btn:hover { background: #2ea043; }
.btn-outline {
  background: transparent;
  border: 1px solid #30363d;
  color: #8b949e;
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 13px;
  cursor: pointer;
}
.btn-outline:hover { border-color: #58a6ff; color: #e1e4e8; }

.project-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
.project-card {
  background: #161b22;
  border: 1px solid #21262d;
  border-radius: 12px;
  padding: 20px;
  position: relative;
}
.project-card .name { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
.project-card .path { font-size: 12px; color: #8b949e; margin-bottom: 12px; word-break: break-all; }
.project-card .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.project-card .stat-label { font-size: 11px; color: #8b949e; }
.project-card .stat-val { font-size: 18px; font-weight: 600; }
.project-card .remove-btn {
  position: absolute; top: 12px; right: 12px;
  background: transparent; border: none; color: #484f58; cursor: pointer; font-size: 16px;
}
.project-card .remove-btn:hover { color: #f85149; }

.empty-state { text-align: center; padding: 40px; color: #484f58; font-size: 14px; }

@media (max-width: 768px) {
  .charts { grid-template-columns: 1fr; }
  .main { padding: 16px; }
  .header { padding: 16px; }
}
</style>
</head>
<body>

<div class="header">
  <h1><span>RTK</span> Token <span data-i18n="title_suffix">Dashboard</span></h1>
  <div class="header-right">
    <button class="btn-outline" id="lang-toggle" onclick="toggleLang()">中文</button>
    <span class="dot"></span>
    <span id="last-update" data-i18n="loading">Loading...</span>
    <span>|</span>
    <span data-i18n="auto_refresh">Auto-refresh: 30s</span>
  </div>
</div>

<div class="main">
  <div class="cards">
    <div class="card">
      <div class="card-label" data-i18n="total_commands">TOTAL COMMANDS</div>
      <div class="card-value blue" id="total-commands">-</div>
      <div class="card-sub" id="total-time">-</div>
    </div>
    <div class="card">
      <div class="card-label" data-i18n="tokens_saved">TOKENS SAVED</div>
      <div class="card-value green" id="tokens-saved">-</div>
      <div class="card-sub" id="tokens-detail">-</div>
    </div>
    <div class="card">
      <div class="card-label" data-i18n="savings_rate">SAVINGS RATE</div>
      <div class="card-value purple" id="savings-rate">-</div>
      <div class="eff-bar-wrap">
        <div class="eff-bar"><div class="eff-bar-fill" id="eff-fill" style="width:0%"></div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-label" data-i18n="input_output">INPUT / OUTPUT</div>
      <div class="card-value orange" id="io-tokens">-</div>
      <div class="card-sub" data-i18n="io_sub">input vs output tokens</div>
    </div>
  </div>

  <div class="charts">
    <div class="chart-box">
      <h3 data-i18n="daily_chart">Daily Token Usage</h3>
      <canvas id="dailyChart"></canvas>
    </div>
    <div class="chart-box">
      <h3 data-i18n="weekly_chart">Weekly Savings</h3>
      <canvas id="weeklyChart"></canvas>
    </div>
  </div>

  <div class="projects-section">
    <h2 data-i18n="projects">Projects</h2>
    <div class="add-project">
      <input type="text" id="project-name" data-i18n-placeholder="ph_name" placeholder="Project name (optional)">
      <input type="text" id="project-path" data-i18n-placeholder="ph_path" placeholder="Project directory path, e.g. C:\Users\Luo\my-project">
      <button class="btn" onclick="addProject()" data-i18n="add_project">Add Project</button>
    </div>
    <div class="project-cards" id="project-cards"></div>
  </div>
</div>

<script>
// --- i18n ---
const I18N = {
  en: {
    title_suffix: 'Dashboard',
    loading: 'Loading...',
    auto_refresh: 'Auto-refresh: 30s',
    total_commands: 'TOTAL COMMANDS',
    tokens_saved: 'TOKENS SAVED',
    savings_rate: 'SAVINGS RATE',
    input_output: 'INPUT / OUTPUT',
    io_sub: 'input vs output tokens',
    total_time: 'Total time',
    of_total: 'of',
    total: 'total',
    daily_chart: 'Daily Token Usage',
    daily_input: 'Input',
    daily_output: 'Output',
    daily_saved: 'Saved',
    weekly_chart: 'Weekly Savings',
    weekly_input: 'Input',
    weekly_saved: 'Saved',
    weekly_pct: 'Savings %',
    projects: 'Projects',
    ph_name: 'Project name (optional)',
    ph_path: 'Project directory path, e.g. C:\\Users\\Luo\\my-project',
    add_project: 'Add Project',
    empty_projects: 'No projects added yet. Add a project directory above.',
    loading_stats: 'Loading...',
    stat_commands: 'Commands',
    stat_savings: 'Savings',
    stat_saved: 'Saved',
    stat_time: 'Time',
    error_prefix: 'Error',
    updated: 'Updated',
    remove_title: 'Remove',
  },
  zh: {
    title_suffix: '仪表盘',
    loading: '加载中...',
    auto_refresh: '自动刷新: 30秒',
    total_commands: '总命令数',
    tokens_saved: '节省 TOKEN',
    savings_rate: '节省率',
    input_output: '输入 / 输出',
    io_sub: '输入 vs 输出 token',
    total_time: '总耗时',
    of_total: '共',
    total: 'tokens',
    daily_chart: '每日 Token 使用量',
    daily_input: '输入',
    daily_output: '输出',
    daily_saved: '节省',
    weekly_chart: '每周节省量',
    weekly_input: '输入',
    weekly_saved: '节省',
    weekly_pct: '节省率 %',
    projects: '项目',
    ph_name: '项目名称（可选）',
    ph_path: '项目目录路径，例如 C:\\Users\\Luo\\my-project',
    add_project: '添加项目',
    empty_projects: '暂无项目，请在上方添加项目目录',
    loading_stats: '加载中...',
    stat_commands: '命令数',
    stat_savings: '节省率',
    stat_saved: '节省量',
    stat_time: '耗时',
    error_prefix: '错误',
    updated: '更新',
    remove_title: '移除',
  }
};

let lang = localStorage.getItem('rtk_lang') || 'en';
let t = I18N[lang];

function toggleLang() {
  lang = lang === 'en' ? 'zh' : 'en';
  localStorage.setItem('rtk_lang', lang);
  t = I18N[lang];
  applyLang();
  refresh();
  renderProjects();
}

function applyLang() {
  document.getElementById('lang-toggle').textContent = lang === 'en' ? '中文' : 'English';
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t[el.dataset.i18n] || el.textContent;
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t[el.dataset.i18nPlaceholder] || el.placeholder;
  });
}

// --- Formatting ---
function fmtTokens(n) {
  if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
  return n.toString();
}
function fmtTime(ms) {
  const s = ms / 1000;
  if (s >= 3600) return (s / 3600).toFixed(1) + 'h';
  if (s >= 60) return (s / 60).toFixed(0) + 'm';
  return s.toFixed(0) + 's';
}

// --- Charts ---
let dailyChart, weeklyChart;

function initCharts() {
  const dailyCtx = document.getElementById('dailyChart').getContext('2d');
  dailyChart = new Chart(dailyCtx, {
    type: 'bar',
    data: { labels: [], datasets: [] },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: { legend: { labels: { color: '#8b949e', font: { size: 11 } } } },
      scales: {
        x: { ticks: { color: '#8b949e', font: { size: 10 } }, grid: { color: '#21262d' } },
        y: { ticks: { color: '#8b949e', font: { size: 10 }, callback: v => fmtTokens(v) }, grid: { color: '#21262d' } }
      }
    }
  });

  const weeklyCtx = document.getElementById('weeklyChart').getContext('2d');
  weeklyChart = new Chart(weeklyCtx, {
    type: 'bar',
    data: { labels: [], datasets: [] },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: { legend: { labels: { color: '#8b949e', font: { size: 11 } } } },
      scales: {
        x: { ticks: { color: '#8b949e', font: { size: 10 } }, grid: { color: '#21262d' } },
        y: { ticks: { color: '#8b949e', font: { size: 10 }, callback: v => fmtTokens(v) }, grid: { color: '#21262d' } }
      }
    }
  });
}

function updateCharts(data) {
  const daily = data.daily || [];
  dailyChart.data.labels = daily.map(d => d.date.slice(5));
  dailyChart.data.datasets = [
    { label: t.daily_input, data: daily.map(d => d.input_tokens), backgroundColor: '#58a6ff88', borderColor: '#58a6ff', borderWidth: 1 },
    { label: t.daily_output, data: daily.map(d => d.output_tokens), backgroundColor: '#bc8cff88', borderColor: '#bc8cff', borderWidth: 1 },
    { label: t.daily_saved, data: daily.map(d => d.saved_tokens), backgroundColor: '#3fb95088', borderColor: '#3fb950', borderWidth: 1 }
  ];
  dailyChart.update();

  const weekly = data.weekly || [];
  weeklyChart.data.labels = weekly.map(w => w.week_start.slice(5) + '~' + w.week_end.slice(5));
  weeklyChart.data.datasets = [
    { label: t.weekly_input, data: weekly.map(w => w.input_tokens), backgroundColor: '#58a6ff88', borderColor: '#58a6ff', borderWidth: 1 },
    { label: t.weekly_saved, data: weekly.map(w => w.saved_tokens), backgroundColor: '#3fb95088', borderColor: '#3fb950', borderWidth: 1 },
    { label: t.weekly_pct, data: weekly.map(w => w.savings_pct), type: 'line', yAxisID: 'y1', borderColor: '#d29922', backgroundColor: '#d2992244', pointRadius: 4, tension: 0.3 }
  ];
  weeklyChart.options.scales.y1 = {
    position: 'right', min: 0, max: 100,
    ticks: { color: '#d29922', callback: v => v + '%' }, grid: { drawOnChartArea: false }
  };
  weeklyChart.update();
}

// --- Summary Cards ---
function updateSummary(data) {
  const s = data.summary;
  document.getElementById('total-commands').textContent = s.total_commands.toLocaleString();
  document.getElementById('total-time').textContent = t.total_time + ': ' + fmtTime(s.total_time_ms);
  document.getElementById('tokens-saved').textContent = fmtTokens(s.total_saved) + ' tokens';
  document.getElementById('tokens-detail').textContent = t.of_total + ' ' + fmtTokens(s.total_input + s.total_output) + ' ' + t.total;
  document.getElementById('savings-rate').textContent = s.avg_savings_pct.toFixed(1) + '%';
  document.getElementById('eff-fill').style.width = s.avg_savings_pct + '%';
  document.getElementById('io-tokens').textContent = fmtTokens(s.total_input) + ' / ' + fmtTokens(s.total_output);
}

// --- Projects ---
let projects = [];

async function loadProjects() {
  const res = await fetch('/api/projects');
  projects = await res.json();
  renderProjects();
}

function renderProjects() {
  const container = document.getElementById('project-cards');
  if (!projects.length) {
    container.innerHTML = `<div class="empty-state">${t.empty_projects}</div>`;
    return;
  }
  container.innerHTML = projects.map(p => {
    const id = btoa(p.path);
    return `
    <div class="project-card" id="proj-${id}">
      <button class="remove-btn" onclick="removeProject('${p.path.replace(/\\/g, '\\\\')}')" title="${t.remove_title}">&times;</button>
      <div class="name">${p.name}</div>
      <div class="path">${p.path}</div>
      <div class="stats" id="stats-${id}">
        <div class="stat-item"><div class="stat-label">${t.loading_stats}</div></div>
      </div>
    </div>`;
  }).join('');
  projects.forEach(p => loadProjectStats(p));
}

async function loadProjectStats(p) {
  const res = await fetch('/api/project?path=' + encodeURIComponent(p.path));
  const data = await res.json();
  const id = btoa(p.path);
  if (data.error) {
    document.getElementById('stats-' + id).innerHTML =
      `<div class="stat-item"><div class="stat-label">${t.error_prefix}: ${data.error}</div></div>`;
    return;
  }
  const s = data.summary;
  document.getElementById('stats-' + id).innerHTML = `
    <div class="stat-item"><div class="stat-label">${t.stat_commands}</div><div class="stat-val">${s.total_commands}</div></div>
    <div class="stat-item"><div class="stat-label">${t.stat_savings}</div><div class="stat-val green">${s.avg_savings_pct.toFixed(1)}%</div></div>
    <div class="stat-item"><div class="stat-label">${t.stat_saved}</div><div class="stat-val blue">${fmtTokens(s.total_saved)}</div></div>
    <div class="stat-item"><div class="stat-label">${t.stat_time}</div><div class="stat-val orange">${fmtTime(s.total_time_ms)}</div></div>
  `;
}

async function addProject() {
  const nameEl = document.getElementById('project-name');
  const pathEl = document.getElementById('project-path');
  const path = pathEl.value.trim();
  const name = nameEl.value.trim();
  if (!path) return;
  await fetch('/api/projects', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path, name })
  });
  nameEl.value = '';
  pathEl.value = '';
  loadProjects();
}

async function removeProject(path) {
  await fetch('/api/projects', {
    method: 'DELETE',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path })
  });
  loadProjects();
}

// --- Refresh ---
async function refresh() {
  try {
    const res = await fetch('/api/global');
    const data = await res.json();
    if (!data.error) {
      updateSummary(data);
      updateCharts(data);
    }
  } catch (e) {}
  document.getElementById('last-update').textContent = t.updated + ': ' + new Date().toLocaleTimeString();
}

// --- Init ---
initCharts();
applyLang();
refresh();
loadProjects();
setInterval(refresh, 30000);

document.getElementById('project-path').addEventListener('keydown', e => { if (e.key === 'Enter') addProject(); });
document.getElementById('project-name').addEventListener('keydown', e => { if (e.key === 'Enter') addProject(); });
</script>
</body>
</html>
